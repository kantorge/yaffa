name: Build and Push Docker images for new version

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Source branch name for Docker tag (e.g. feat/monthly-breakdown-tab)'
        required: true
        default: 'develop'
      platforms:
        description: 'Platforms to build (comma-separated)'
        required: false
        default: 'linux/amd64'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set version from workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          BRANCH=$(echo "${{ github.event.inputs.source_branch }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          DATE=$(date +%Y%m%d-%H%M)
          echo "DOCKER_VERSION_TAG=${BRANCH}-${DATE}" >> $GITHUB_ENV
          echo "SOURCE_BRANCH=${{ github.event.inputs.source_branch }}" >> $GITHUB_ENV

      - name: Set version from release tag
        if: github.event_name == 'release'
        run: echo "DOCKER_VERSION_TAG=${{ github.event.release.tag_name }}" >> $GITHUB_ENV

      - name: Set platforms
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "BUILD_PLATFORMS=${{ github.event.inputs.platforms }}" >> $GITHUB_ENV
          else
            echo "BUILD_PLATFORMS=linux/amd64,linux/arm64" >> $GITHUB_ENV
          fi

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/yaffa" >> $GITHUB_ENV

      - name: Print build info
        run: |
          echo "event: ${{ github.event_name }}"
          echo "build branch: ${{ github.ref_name }}"
          echo "source branch: ${{ env.SOURCE_BRANCH || github.ref_name }}"
          echo "version tag: ${{ env.DOCKER_VERSION_TAG }}"
          echo "platforms: ${{ env.BUILD_PLATFORMS }}"
          echo "image: ${{ env.IMAGE_NAME }}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            buildx-${{ github.ref_name }}-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: ${{ env.BUILD_PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.DOCKER_VERSION_TAG }}
            ${{ env.DOCKER_VERSION_TAG != 'test' && format('{0}:latest', env.IMAGE_NAME) || '' }}
          build-args: |
            BRANCH=${{ env.SOURCE_BRANCH || github.ref_name }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

      - name: Move cache to current path
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
